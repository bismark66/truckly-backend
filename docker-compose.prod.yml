# Production overrides for docker-compose
version: '3.8'

services:
  app-prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: truckly_app
    restart: always
    environment:
      NODE_ENV: production
    env_file:
      - .env
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      - postgres
      - redis
    networks:
      - truckly_network
