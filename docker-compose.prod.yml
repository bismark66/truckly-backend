# Production overrides for docker-compose
version: '3.8'

services:
  app-prod:
    image: truckly-backend:production
    build:
      context: .
      dockerfile: Dockerfile
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    restart: always
    environment:
      NODE_ENV: production
