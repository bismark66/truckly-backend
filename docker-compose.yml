version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: truckly_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-truckly}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - truckly_network

  redis:
    image: redis:7
    container_name: truckly_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - truckly_network

networks:
  truckly_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
